<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copa Manager 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0F1117;
  --surface:#1A1D27;
  --surface-2:#242837;
  --ink:#EDEFF5;
  --muted:#9298AC;
  --line:#2B2F3D;
  --indigo:#6D63F5;
  --indigo-bright:#8B82FF;
  --coral:#FF6B4D;
  --coral-bright:#FF8266;
  --lime:#CBFF4D;
  --amber:#F5C842;
  --success:#34D399;
  --danger:#FF6B6A;
  --radius:16px;
  --radius-sm:10px;
  --shadow:0 1px 2px rgba(0,0,0,0.4), 0 8px 28px rgba(0,0,0,0.4);
  --shadow-lift:0 10px 30px rgba(109,99,245,0.35);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:'Inter',sans-serif;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,.display{
  font-family:'Space Grotesk',sans-serif;
  font-weight:700;
  letter-spacing:-0.01em;
  color:var(--ink);
}
.mono{font-family:'JetBrains Mono',monospace;}
button{font-family:'Inter',sans-serif;cursor:pointer;}
a{color:inherit;}

/* ---------- App shell ---------- */
#app{min-height:100vh;display:flex;flex-direction:column;}

.topbar{
  background:var(--surface);
  color:var(--ink);
  padding:16px 20px 0;
  position:sticky;top:0;z-index:50;
  border-bottom:1px solid var(--line);
}
.topbar-inner{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;max-width:1280px;margin:0 auto;}
.nav-tools{display:flex;align-items:center;gap:8px;flex:1;min-width:200px;justify-content:flex-start;}
.global-search{position:relative;display:flex;align-items:center;flex:1;max-width:340px;}
.global-search .gs-icon{position:absolute;left:10px;font-size:12px;opacity:.7;pointer-events:none;}
.global-search input{width:100%;padding:8px 11px 8px 30px;font-size:13px;background:var(--surface-2);border-radius:20px;}
.global-search-results{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--surface);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);z-index:60;max-height:340px;overflow-y:auto;display:none;padding:5px;}
.global-search-results.open{display:block;}
.global-search-results .gs-item{display:flex;flex-direction:column;align-items:flex-start;gap:1px;width:100%;background:transparent;border:none;text-align:left;padding:8px 10px;border-radius:8px;color:var(--ink);}
.global-search-results .gs-item:hover{background:var(--surface-2);box-shadow:none;}
.global-search-results .gs-label{font-size:13.5px;font-weight:600;font-family:'Space Grotesk',sans-serif;}
.global-search-results .gs-sub{font-size:11px;color:var(--muted);}
.global-search-results .gs-empty{padding:12px 10px;font-size:12.5px;color:var(--muted);text-align:center;}
.global-search-results .gs-group{font-size:10px;text-transform:uppercase;letter-spacing:0.05em;color:var(--muted);font-weight:700;padding:8px 10px 3px;}
@media (max-width:640px){.nav-tools{order:3;flex-basis:100%;} .global-search{max-width:none;}}
.brand{display:flex;align-items:center;gap:10px;}
.brand .crest{
  width:36px;height:36px;border-radius:11px;
  object-fit:cover;display:block;flex-shrink:0;
  box-shadow:0 4px 10px rgba(0,0,0,0.35);
}
.brand .title{font-size:17px;font-weight:700;letter-spacing:-0.01em;font-family:'Space Grotesk',sans-serif;}
.brand .title small{display:block;font-family:'Inter',sans-serif;font-weight:500;font-size:11.5px;color:var(--muted);letter-spacing:0;}
.season-badge{
  font-family:'JetBrains Mono',monospace;font-size:12px;background:rgba(109,99,245,0.16);color:var(--indigo-bright);
  padding:6px 12px;border-radius:20px;font-weight:600;
}

.tabs{display:flex;gap:2px;max-width:1280px;margin:14px auto 0;overflow-x:auto;scrollbar-width:none;background:var(--bg);padding:4px;border-radius:14px 14px 0 0;}
.tabs::-webkit-scrollbar{display:none;}
.tab-btn{
  background:transparent;border:none;color:var(--muted);
  font-family:'Space Grotesk',sans-serif;font-weight:600;
  font-size:13.5px;padding:9px 16px;border-radius:10px 10px 0 0;white-space:nowrap;
  transition:color .15s, background .15s;
}
.tab-btn:hover{color:var(--ink);background:var(--surface-2);}
.tab-btn.active{color:var(--indigo-bright);background:var(--surface);box-shadow:0 -1px 0 0 var(--line) inset;}

main#view{flex:1;max-width:1280px;margin:0 auto;width:100%;padding:24px 20px 60px;}

/* ---------- Generic components ---------- */
.grid{display:grid;gap:14px;}
.grid.cols-4{grid-template-columns:repeat(4,1fr);}
.grid.cols-3{grid-template-columns:repeat(3,1fr);}
.grid.cols-2{grid-template-columns:repeat(2,1fr);}
@media (max-width:900px){.grid.cols-4{grid-template-columns:repeat(2,1fr);} .grid.cols-3{grid-template-columns:repeat(2,1fr);} .grid.cols-2{grid-template-columns:1fr;}}
@media (max-width:560px){.grid.cols-4{grid-template-columns:1fr;}}

.card{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:18px;box-shadow:var(--shadow);
}
.stat-card .num{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:700;color:var(--indigo);}
.stat-card .label{font-size:12px;color:var(--muted);margin-top:3px;font-weight:500;}

.section-title{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:30px 0 14px;}
.section-title h2{font-size:18px;margin:0;}
.section-title .hint{font-size:12.5px;color:var(--muted);font-weight:500;}
.tab-desc{font-size:12.5px;color:var(--muted);margin:-8px 0 18px;max-width:760px;}

.btn{
  border:none;border-radius:10px;padding:9px 16px;font-size:13.5px;font-weight:600;
  background:var(--indigo);color:#fff;transition:transform .08s, background .15s, box-shadow .15s;
}
.btn:hover{background:var(--indigo-bright);box-shadow:var(--shadow-lift);}
.btn:active{transform:scale(0.97);}
.btn.gold{background:var(--coral);color:#fff;}
.btn.gold:hover{background:var(--coral-bright);box-shadow:0 8px 20px rgba(255,107,77,0.3);}
.btn.ghost{background:var(--surface);color:var(--ink);border:1px solid var(--line);}
.btn.ghost:hover{background:var(--surface-2);box-shadow:none;}
.btn.danger{background:var(--surface);color:var(--danger);border:1px solid rgba(255,107,106,0.35);}
.btn.danger:hover{background:rgba(255,107,106,0.12);box-shadow:none;}
.btn.sm{padding:6px 11px;font-size:12px;border-radius:8px;}
.btn:disabled{opacity:0.4;cursor:not-allowed;}

input,select,textarea{
  font-family:'Inter',sans-serif;border:1px solid var(--line);border-radius:9px;
  padding:9px 11px;font-size:13.5px;background:var(--surface);color:var(--ink);width:100%;
}
input:focus,select:focus,textarea:focus{outline:2px solid var(--indigo-bright);outline-offset:1px;}
input[type=color]{padding:3px;height:38px;}
.color-square{width:56px;height:56px;padding:3px;cursor:pointer;}
.color-square-sm{width:32px;height:32px;padding:2px;cursor:pointer;}
.color-hex-text{width:60px;font-size:10px;text-align:center;background:var(--surface-2);border:1px solid var(--line);border-radius:4px;padding:3px 2px;color:var(--text);text-transform:uppercase;}
.kit-drag-card{cursor:grab;}
.kit-drag-card.dragging, .combo-block.dragging{opacity:0.4;}
.kit-drag-card.drag-over{outline:2px dashed var(--indigo-bright);outline-offset:2px;}
.combo-block.drag-over-top{box-shadow:inset 0 3px 0 0 var(--indigo-bright);}
.combo-block.drag-over-bottom{box-shadow:inset 0 -3px 0 0 var(--indigo-bright);}
label.field{display:flex;flex-direction:column;gap:5px;font-size:12px;color:var(--muted);font-weight:600;}

.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;vertical-align:middle;}
.badge.host{background:rgba(255,107,77,0.16);color:var(--coral-bright);}
.badge.conf{background:rgba(109,99,245,0.16);color:var(--indigo-bright);}
.badge.incomplete{background:rgba(255,107,106,0.16);color:var(--danger);}
.badge.ok{background:rgba(52,211,153,0.16);color:var(--success);}
.badge.fifa{background:var(--surface-2);color:var(--ink);border:1px solid var(--line);font-weight:800;letter-spacing:0.04em;}
.badge.brand{background:rgba(245,200,66,0.16);color:var(--amber);}
.badge.no-contract{background:rgba(146,152,172,0.12);color:var(--muted);}

/* team crest */
.crest-mini{
  width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;
  font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:13px;color:#fff;flex-shrink:0;
  box-shadow:inset 0 -3px 6px rgba(0,0,0,0.18);overflow:hidden;
}
.crest-mini img{width:100%;height:100%;object-fit:cover;display:block;}
.crest-mini.has-img{background:none;box-shadow:none;border-radius:0;overflow:visible;}
.crest-mini.has-img img{object-fit:contain;filter:drop-shadow(0 3px 8px rgba(0,0,0,0.5));}

.img-upload{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.img-upload .thumb{
  width:56px;height:56px;border-radius:10px;border:1px solid var(--line);background:var(--surface-2);
  display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;
}
.img-upload .thumb img{width:100%;height:100%;object-fit:contain;display:block;}
.img-upload .controls{display:flex;flex-direction:column;gap:6px;flex:1;min-width:140px;}
.img-upload input[type=file]{font-size:11.5px;padding:6px;}

.team-card{display:flex;flex-direction:column;gap:10px;cursor:pointer;transition:transform .12s, box-shadow .12s;min-width:0;overflow:hidden;}
.team-card:hover{transform:translateY(-3px);box-shadow:0 14px 28px rgba(79,70,229,0.14);}
.team-card-top{display:flex;gap:12px;align-items:center;min-width:0;}
.team-card-bottom{display:flex;justify-content:space-between;align-items:center;padding-top:9px;border-top:1px solid var(--line);}
.team-card .meta{flex:1;min-width:0;}
.team-card .meta .name{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:'Space Grotesk',sans-serif;}
.team-card .meta .sub{font-size:11px;color:var(--muted);margin-top:3px;display:flex;gap:6px;flex-wrap:wrap;align-content:flex-start;min-height:48px;}
.team-card .rating{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:16px;color:var(--indigo);}

.group-block{margin-bottom:20px;}
.group-block h3{font-size:13px;margin:0 0 10px;color:var(--muted);display:flex;align-items:center;gap:8px;font-weight:600;}
.group-block h3 .tag{background:var(--indigo);color:#fff;font-family:'JetBrains Mono',monospace;border-radius:7px;padding:3px 8px;font-size:12px;}
.detail-topbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.detail-nav{display:flex;align-items:center;gap:6px;}
.btn.sm.arrow{padding:6px 10px;font-size:14px;line-height:1;font-weight:700;min-width:32px;text-align:center;}
.detail-nav-count{font-size:12px;color:var(--muted);letter-spacing:0.02em;}

table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;font-family:'Space Grotesk',sans-serif;font-size:11px;letter-spacing:0.02em;color:var(--muted);padding:9px 10px;border-bottom:2px solid var(--line);font-weight:600;}
td{padding:9px 10px;border-bottom:1px solid var(--line);}
tr:hover td{background:var(--surface-2);}
.tbl-wrap{overflow-x:auto;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);}
/* Rankings: ancho de columnas fijo (definido por <colgroup>) para que se vean idénticas en todas las
   subpestañas (Mundial, CONCACAF, UEFA...) sin importar el contenido de cada confederación. */
.rankings-table{table-layout:fixed;min-width:720px;}
.rankings-table td,.rankings-table th{overflow:hidden;text-overflow:ellipsis;}
.rankings-table td:first-child{white-space:nowrap;}

.pos-chip{font-size:10px;font-weight:700;padding:3px 7px;border-radius:6px;color:#fff;}
.pos-GK{background:#C9A227;} .pos-DF{background:#2E6FE0;} .pos-MF{background:#19A463;} .pos-FW{background:#E1473A;}

.empty{padding:44px 20px;text-align:center;color:var(--muted);border:1.5px dashed var(--line);border-radius:var(--radius);background:var(--surface);}
.empty h3{margin-bottom:4px;}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(4,5,9,0.7);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px;}
.modal-box{background:var(--surface);border-radius:18px;max-width:580px;width:100%;max-height:88vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,0.25);}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:18px 22px;border-bottom:1px solid var(--line);}
.modal-head h2{font-size:16px;margin:0;}
.modal-close{background:none;border:none;font-size:20px;color:var(--muted);line-height:1;}
.modal-body{padding:20px 22px;}
.modal-foot{display:flex;justify-content:flex-end;gap:8px;padding:16px 22px;border-top:1px solid var(--line);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px;}
@media (max-width:480px){.form-grid{grid-template-columns:1fr;}}
.subhead{font-size:12px;font-weight:700;color:var(--indigo);text-transform:uppercase;letter-spacing:0.04em;margin:14px 0 2px;grid-column:1/-1;}

/* Scoreboard / dice (signature element) */
.scoreboard{
  background:linear-gradient(135deg, var(--indigo) 0%, #6D5EF7 55%, var(--coral) 130%);
  border-radius:18px;padding:24px;color:#fff;position:relative;overflow:hidden;
  box-shadow:0 16px 40px rgba(79,70,229,0.3);
}
.sb-row{display:flex;align-items:center;justify-content:center;gap:18px;position:relative;z-index:1;}
.sb-team{flex:1;text-align:center;}
.sb-team .nm{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;}
.sb-score{
  font-family:'JetBrains Mono',monospace;font-size:44px;font-weight:700;
  background:rgba(0,0,0,0.18);border-radius:12px;padding:6px 18px;min-width:70px;text-align:center;
  color:#fff;backdrop-filter:blur(4px);
}
.sb-vs{font-family:'JetBrains Mono',monospace;font-size:12px;color:rgba(255,255,255,0.7);}
.dice-row{display:flex;justify-content:center;gap:10px;margin-top:20px;position:relative;z-index:1;}
.die{
  width:42px;height:42px;border-radius:10px;background:#fff;color:var(--ink);
  display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;
  font-weight:700;font-size:18px;box-shadow:0 4px 10px rgba(0,0,0,0.25);
}
.die.rolling{animation:roll 0.12s infinite;}
@keyframes roll{0%{transform:rotate(0deg) scale(1);}50%{transform:rotate(15deg) scale(1.08);}100%{transform:rotate(0deg) scale(1);}}

.toast{position:fixed;bottom:18px;right:18px;background:var(--indigo);color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;box-shadow:var(--shadow);z-index:300;opacity:0;transform:translateY(8px);transition:opacity .2s, transform .2s;}
.toast.show{opacity:1;transform:translateY(0);}

.note-banner{background:rgba(109,99,245,0.12);border:1px solid rgba(109,99,245,0.3);color:var(--indigo-bright);border-radius:12px;padding:12px 16px;font-size:12.5px;margin-bottom:20px;display:flex;gap:10px;align-items:flex-start;}
.note-banner b{display:block;margin-bottom:2px;}

.kv{display:flex;justify-content:space-between;font-size:12.5px;padding:5px 0;border-bottom:1px dashed var(--line);}
.kv:last-child{border-bottom:none;}

.tag-list{display:flex;flex-wrap:wrap;gap:6px;}
.player-row{display:flex;align-items:center;gap:10px;padding:10px 4px;border-bottom:1px solid var(--line);}
.squad-sortbar{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.squad-sortbar .squad-sortbar-label{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:0.04em;margin-right:2px;}
.sort-chip{display:inline-flex;align-items:center;gap:3px;font-size:12px;font-weight:600;padding:5px 10px;border-radius:8px;border:1px solid var(--line);background:var(--surface);color:var(--muted);cursor:pointer;user-select:none;white-space:nowrap;transition:background .12s,color .12s,border-color .12s;}
.sort-chip:hover{background:var(--surface-2);color:var(--ink);}
.sort-chip.active{border-color:var(--indigo);color:var(--indigo-bright);background:rgba(109,99,245,0.12);}
.sort-chip .arrow{font-family:'JetBrains Mono',monospace;color:var(--indigo-bright);}
.player-row:last-child{border-bottom:none;}
.player-row .pname{flex:1;font-weight:600;font-size:13.5px;}
.player-row .pmeta{font-size:11.5px;color:var(--muted);}
.player-row .prating{font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--indigo);}
.num-badge{
  width:26px;height:26px;border-radius:8px;background:var(--indigo);color:#fff;
  display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;
  font-size:11.5px;font-weight:700;flex-shrink:0;
}
.club-chip{font-size:11px;color:var(--muted);background:var(--surface-2);padding:2px 8px;border-radius:20px;}
.tag-clickable{cursor:pointer;transition:filter .12s ease, box-shadow .12s ease;}
.tag-clickable:hover{filter:brightness(1.25);box-shadow:0 0 0 1.5px var(--indigo-bright);}

.kit-swatch{display:flex;gap:4px;align-items:center;}
.kit-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--surface);box-shadow:0 0 0 1px var(--line);display:inline-block;margin-left:-6px;}
.kit-dot:first-child{margin-left:0;}
.kit-block{display:flex;flex-direction:column;gap:6px;align-items:center;}
.kit-jersey{width:56px;height:56px;border-radius:9px;position:relative;box-shadow:inset 0 0 0 1px rgba(0,0,0,0.25);overflow:hidden;}
.kit-jersey img{width:100%;height:100%;object-fit:cover;display:block;}
.kit-jersey.has-img{width:160px;height:160px;background:none;box-shadow:none;border-radius:0;overflow:visible;}
.kit-jersey.has-img img{object-fit:contain;filter:drop-shadow(0 8px 16px rgba(0,0,0,0.5));}
.kit-label{font-size:10.5px;color:var(--muted);font-weight:600;}

.searchbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.searchbar input{max-width:260px;}
.searchbar select{max-width:180px;}

.subtabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
.subtab-btn{background:var(--surface);border:1px solid var(--line);color:var(--muted);font-size:12.5px;font-weight:600;padding:7px 14px;border-radius:20px;}
.subtab-btn.active{background:var(--indigo);color:#fff;border-color:var(--indigo);}

textarea.json-area{font-family:'JetBrains Mono',monospace;font-size:11.5px;min-height:160px;}

.footer-note{margin-top:40px;font-size:11.5px;color:var(--muted);text-align:center;}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">

// Versión del HTML — se muestra en la esquina superior derecha (WIP · JULIO 2026 · Ver. XX).
// Al hacer cambios y guardar una versión nueva, actualiza este número.
const APP_VERSION = "62";

/* ---------- Datos base (estimación inicial editable) ---------- */



// Nombre oficial del país (no el nombre de la federación) — aproximado, edítalo si lo necesitas distinto
// Nombre de la federación nacional de fútbol (organismo que rige el fútbol en cada país) — dato estable y bien documentado
// Siglas de la federación nacional — la abreviatura corta que se usa coloquialmente (ej. FMF, DFB, RFEF)
// Apodos populares de algunas selecciones — aproximado, edítalo o agrega más desde el modal
const ARTICLE_OPTIONS = [
  {value:"", label:"(sin artículo)"},
  {value:"El", label:"El"}, {value:"La", label:"La"},
  {value:"Los", label:"Los"}, {value:"Las", label:"Las"}
];
// Genera 3 frases de ejemplo que muestran cómo se usa el artículo del club en textos (con las
// contracciones correctas: a+el=al, de+el=del). El nombre se muestra tal cual, sin comillas.
function clubArticleExamples(article, name){
  const q = name||'Equipo';
  const plural = (article==="Los" || article==="Las");
  const gano = plural ? "ganaron con autoridad" : "ganó con autoridad";
  let sujeto, deFrase, aFrase;
  switch(article){
    case "El":
      sujeto = `el ${q}`; deFrase = `del ${q}`; aFrase = `al ${q}`; break;
    case "La":
      sujeto = `la ${q}`; deFrase = `de la ${q}`; aFrase = `a la ${q}`; break;
    case "Los":
      sujeto = `los ${q}`; deFrase = `de los ${q}`; aFrase = `a los ${q}`; break;
    case "Las":
      sujeto = `las ${q}`; deFrase = `de las ${q}`; aFrase = `a las ${q}`; break;
    default: // sin artículo
      sujeto = q; deFrase = `de ${q}`; aFrase = `a ${q}`; break;
  }
  return [
    `Ayer ${sujeto} ${gano}.`,
    `Gran anotación ${deFrase}.`,
    `Llegó un nuevo fichaje ${aFrase}.`
  ];
}
// Refresca en tiempo real el eco del nombre y las frases de ejemplo del artículo en el modal de club,
// usando el "Nombre común" actual y el artículo seleccionado. Se llama al teclear el nombre común
// o al cambiar el selector de artículo.
function refreshClubArticleExamples(){
  const sel = document.getElementById("f-cl-article");
  const examplesEl = document.getElementById("f-cl-article-examples");
  if(!sel || !examplesEl) return;
  const nameInput = document.getElementById("f-cl-commonname");
  const name = (nameInput && nameInput.value.trim()) || "";
  const echo = document.getElementById("f-cl-article-name-echo");
  if(echo) echo.value = name || "Nombre del club";
  examplesEl.textContent = clubArticleExamples(sel.value, name || "Equipo").join("  ·  ");
}
document.addEventListener("input", (e)=>{
  if(e.target && (e.target.id==="f-cl-commonname" || e.target.id==="f-cl-article")) refreshClubArticleExamples();
});
document.addEventListener("change", (e)=>{
  if(e.target && e.target.id==="f-cl-article") refreshClubArticleExamples();
});

}

    const linked = document.getElementById("f-pfullname-linked");

      const fn = document.getElementById("f-pfirstname").value;
      const ln = document.getElementById("f-plastname").value;
      full.value = `${fn} ${ln}`.trim();
    }
  } else if(id==="f-pfullname"){

    if(linked) linked.value = "0";
  }

    const common = document.getElementById("f-pcommonname").value.trim();
    const last = document.getElementById("f-plastname").value.trim();
    const val = (common || last || "").toUpperCase();
    ["team","club"].forEach(scope=>{
      const linked = document.getElementById(`f-pshirtname-${scope}-linked`);
      const field = document.getElementById(`f-pshirtname-${scope}`);
      if(linked && linked.value==="1" && field) field.value = val;
    });
  } else if(id==="f-pshirtname-team"){
    const linked = document.getElementById("f-pshirtname-team-linked");
    if(linked) linked.value = "0";
  } else if(id==="f-pshirtname-club"){
    const linked = document.getElementById("f-pshirtname-club-linked");
    if(linked) linked.value = "0";
  }
  if(id==="f-pbirth"){
    const hint = document.getElementById("f-page-hint");
    if(hint){
      const a = computeAge(e.target.value);
      hint.textContent = a!=null ? `Edad: ${a} años` : "Opcional — de aquí se calcula la edad.";
    }
  }
});

// Busca todos los contenedores ".kit-render" pendientes en el DOM y los llena con la composición final.
// Asegura que cada selección tenga al menos 2 uniformes de jugador (Local/Visitante) y 1 de portero,
// migrando los colores antiguos si existían. Se llama siempre al cargar/migrar la base.


document.addEventListener("change", (e)=>{
  const input = e.target;
  if(input.matches && input.matches('input[type=file][data-replace-outline]')){
    const file = input.files && input.files[0];
    if(!file) return;
    const type = input.dataset.type, slot = input.dataset.slot;
    resizeImageToDataURL(file, RECOLORABLE_BASE_MAX_DIM).then(dataUrl=>{
      if(type==="shirt"){
        if(slot==="front") DB.kitTexture = dataUrl;
        else if(slot==="back") DB.kitTextureBack = dataUrl;
        else if(slot==="gkfront") DB.gkTexture = dataUrl;
        else if(slot==="gkback") DB.gkTextureBack = dataUrl;
      } else {
        const cfg = garmentConfig(type);
        DB[cfg.textureKey] = dataUrl;
      }
      persist(); render();
      showToast("Contorno actualizado");
    }).catch(()=>{ showToast("No se pudo procesar esa imagen"); });
    return;
  }
  if(input.matches && input.matches('input[type=file][data-replace-garmentbase]')){
    const file = input.files && input.files[0];
    if(!file) return;
    const cfg = garmentConfig(input.dataset.type);
    resizeImageToDataURL(file, RECOLORABLE_BASE_MAX_DIM).then(dataUrl=>{
      const base = DB[cfg.basesKey].find(b=>b.id===input.dataset.id);
      if(base){
        const side = input.dataset.side;
        if(side==="back") base.backImg = dataUrl;
        else if(side==="gkfront") base.gkImg = dataUrl;
        else if(side==="gkback") base.gkBackImg = dataUrl;
        else base.baseImg = dataUrl;
        persist(); render();
        showToast(`${garmentName(input.dataset.type, base.number)} actualizada`);
      }
    }).catch(()=>{ showToast("No se pudo procesar esa imagen"); });
    return;
  }
  if(input.matches && input.matches('input[type=file][data-replace-numberfont]')){
    const file = input.files && input.files[0];
    if(!file) return;
    readFileAsDataURL(file).then(dataUrl=>{
      const entry = DB.numberFonts.find(f=>f.id===input.dataset.id);
      if(entry){
        entry.fontData = dataUrl;
        delete _loadedNumberFontFamilies[entry.id];
        persist(); render();
        showToast(`${numberFontLabel(entry)} actualizada`);
      }
    }).catch(()=>{ showToast("No se pudo procesar ese archivo de tipografía"); });
    return;
  }
  if(input.matches && input.matches('input[type=file][data-replace-backbase]')){
    const file = input.files && input.files[0];
    if(!file) return;
    resizeImageToDataURL(file, RECOLORABLE_BASE_MAX_DIM).then(dataUrl=>{
      const base = DB.backBases.find(b=>b.id===input.dataset.id);
      if(base){
        base.baseImg = dataUrl;
        persist(); render();
        showToast(`${backBaseDisplayLabel(base)} actualizado`);
      }
    }).catch(()=>{ showToast("No se pudo procesar esa imagen"); });
    return;
  }
  if(input.matches && input.matches('input[type=file][data-layerfile]')){
    const file = input.files && input.files[0];
    if(!file) return;
    resizeImageToDataURL(file, RECOLORABLE_BASE_MAX_DIM).then(dataUrl=>{
      const row = input.closest(".layer-row");
      if(row){
        row.dataset.img = dataUrl;
        row.querySelector(".layer-thumb").innerHTML = `<img src="${dataUrl}" style="width:100%;height:100%;object-fit:contain;">`;
      }
      const block = input.closest(".combo-block");
      if(block) refreshComboBlockPreview(block); else refreshKitModalPreview();
    }).catch(()=>{ showToast("No se pudo procesar esa imagen"); });
    return;
  }
  if(input.matches && input.matches('input[type=file][data-fontfield]')){
    const file = input.files && input.files[0];
    if(!file) return;
    readFileAsDataURL(file).then(dataUrl=>{
      const hidden = document.getElementById(input.dataset.target);
      if(hidden) hidden.value = dataUrl;
    }).catch(()=>{ showToast("No se pudo procesar ese archivo de tipografía"); });
    return;
  }
  if(!(input.matches && input.matches('input[type=file][data-imgfield]'))) return;
  const file = input.files && input.files[0];
  if(!file) return;
  resizeImageToDataURL(file, parseInt(input.dataset.maxdim)||300).then(dataUrl=>{
    const hidden = document.getElementById(input.dataset.target);
    if(hidden) hidden.value = dataUrl;
    const preview = document.getElementById(input.dataset.preview);
    if(preview){ preview.src = dataUrl; preview.style.display = "block"; }
  }).catch(()=>{ showToast("No se pudo procesar esa imagen"); });
});

/* ---------- Arrastrar para reordenar: uniformes (Local/Visita/Tercero...) ---------- */
// Solo se puede soltar sobre una tarjeta de la MISMA categoría (jugador con jugador, portero con portero).
document.addEventListener("dragstart", (e)=>{
  const card = e.target.closest(".kit-drag-card");
  if(!card) return;
  dragKitInfo = {teamId: card.dataset.team, kitId: card.dataset.kitId, category: card.dataset.category};
  if(e.dataTransfer){ e.dataTransfer.effectAllowed = "move"; e.dataTransfer.setData("text/plain", card.dataset.kitId); }
  card.classList.add("dragging");
});
document.addEventListener("dragover", (e)=>{
  const card = e.target.closest(".kit-drag-card");
  if(!card || !dragKitInfo || card.dataset.category!==dragKitInfo.category) return;
  e.preventDefault();
  if(card.dataset.kitId!==dragKitInfo.kitId) card.classList.add("drag-over");
});
document.addEventListener("dragleave", (e)=>{
  const card = e.target.closest(".kit-drag-card");
  if(card) card.classList.remove("drag-over");
});
document.addEventListener("drop", (e)=>{
  const card = e.target.closest(".kit-drag-card");
  if(!card || !dragKitInfo || card.dataset.category!==dragKitInfo.category) return;
  e.preventDefault();
  card.classList.remove("drag-over");
  const team = getTeam(dragKitInfo.teamId);
  if(!team) return;
  const fromId = dragKitInfo.kitId, toId = card.dataset.kitId;
  if(fromId===toId) return;
  const fromIdx = team.kits.findIndex(k=>k.id===fromId);
  if(fromIdx<0) return;
  const [moved] = team.kits.splice(fromIdx,1);
  const toIdx = team.kits.findIndex(k=>k.id===toId);
  team.kits.splice(toIdx, 0, moved);
  ensureTeamKits(team);
  persist(); render();
  modalManageKits(team);
});
document.addEventListener("dragend", (e)=>{
  if(e.target.closest && e.target.closest(".kit-drag-card")){
    document.querySelectorAll(".kit-drag-card.dragging, .kit-drag-card.drag-over").forEach(el=>el.classList.remove("dragging","drag-over"));
    dragKitInfo = null;
  }
});

/* ---------- Arrastrar para reordenar: combinaciones dentro de un uniforme ---------- */
document.addEventListener("dragstart", (e)=>{
  const block = e.target.closest(".combo-block");
  if(!block) return;
  draggedComboBlock = block;
  if(e.dataTransfer){ e.dataTransfer.effectAllowed = "move"; e.dataTransfer.setData("text/plain", "combo"); }
  block.classList.add("dragging");
});
document.addEventListener("dragover", (e)=>{
  const block = e.target.closest(".combo-block");
  if(!block || !draggedComboBlock || block===draggedComboBlock) return;
  e.preventDefault();
  const rect = block.getBoundingClientRect();
  const before = (e.clientY - rect.top) < rect.height/2;
  block.classList.toggle("drag-over-top", before);
  block.classList.toggle("drag-over-bottom", !before);
});
document.addEventListener("dragleave", (e)=>{
  const block = e.target.closest(".combo-block");
  if(block) block.classList.remove("drag-over-top","drag-over-bottom");
});
document.addEventListener("drop", (e)=>{
  const block = e.target.closest(".combo-block");
  if(!block || !draggedComboBlock || block===draggedComboBlock) return;
  e.preventDefault();
  block.classList.remove("drag-over-top","drag-over-bottom");
  const container = document.getElementById("kit-combo-rows");
  if(!container || !container.contains(block)) return;
  const rect = block.getBoundingClientRect();
  const before = (e.clientY - rect.top) < rect.height/2;
  if(before) container.insertBefore(draggedComboBlock, block);
  else container.insertBefore(draggedComboBlock, block.nextSibling);
  renumberComboBlocks();
});
document.addEventListener("dragend", (e)=>{
  if(e.target.closest && e.target.closest(".combo-block")){
    document.querySelectorAll(".combo-block.dragging, .combo-block.drag-over-top, .combo-block.drag-over-bottom").forEach(el=>el.classList.remove("dragging","drag-over-top","drag-over-bottom"));
    draggedComboBlock = null;
  }
});
